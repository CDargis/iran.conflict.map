<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Conflict Tracker</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:     #13110e;
      --panel:  #1b1814;
      --border: #2e2820;
      --accent: #9b2335;
      --amber:  #c8a84b;
      --green:  #4a7c59;
      --blue:   #5b8db8;
      --text:   #e8ddd0;
      --dim:    #9e9080;
      --mono:   'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
    }

    /* ── Topbar ── */
    #topbar {
      position: sticky; top: 0; z-index: 10;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #topbar-left { display: flex; align-items: center; gap: 16px; }
    #topbar-title { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); }
    #topbar a { font-size: 11px; color: var(--dim); text-decoration: none; }
    #topbar a:hover { color: var(--text); }
    #auth-status { font-size: 10px; color: var(--dim); }
    #auth-status.authed { color: var(--green); }

    /* ── Layout ── */
    #content { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

    /* ── Section ── */
    .section { margin-bottom: 36px; }
    .section-title {
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--dim);
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ── Buttons ── */
    .btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { border-color: var(--text); }
    .btn:disabled { opacity: .4; cursor: default; }
    .btn.accent  { border-color: var(--accent); color: var(--accent); }
    .btn.green   { border-color: var(--green);  color: var(--green);  }
    .btn.blue    { border-color: var(--blue);   color: var(--blue);   }
    .btn.dim     { color: var(--dim); }

    /* ── Controls row ── */
    #controls-row { display: flex; align-items: center; gap: 8px; }
    #url-input {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 3px;
    }
    #url-input::placeholder { color: var(--dim); }
    #url-input:focus { outline: none; border-color: var(--accent); }
    #sync-status { font-size: 10px; color: var(--dim); margin-top: 6px; min-height: 16px; }

    /* ── Review items ── */
    .review-item {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .review-note {
      color: var(--amber);
      font-size: 11px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .review-source {
      font-size: 10px;
      margin-bottom: 12px;
    }
    .review-source a { color: var(--accent); text-decoration: none; word-break: break-all; }
    .review-source a:hover { text-decoration: underline; }
    .review-payloads {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .review-payloads.three-col {
      grid-template-columns: 1fr 1fr 1fr;
    }
    .review-payload {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 10px;
    }
    .review-payload.unavailable { opacity: .4; }
    .review-payload-label {
      font-size: 9px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 8px;
    }
    .review-payload pre {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
      max-height: 480px;
      overflow-y: auto;
    }
    .review-payload-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .review-payload-header .review-payload-label { margin-bottom: 0; }
    .pane-toggle { font-size: 8px; letter-spacing: .08em; text-transform: uppercase; background: none; border: 1px solid var(--border); color: var(--dim); padding: 1px 5px; border-radius: 2px; cursor: pointer; line-height: 1.6; }
    .pane-toggle:hover { color: var(--text); border-color: var(--text); }
    .review-kv { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 10px; }
    .review-kv td { padding: 2px 0; vertical-align: top; line-height: 1.5; }
    .review-kv td:first-child { color: var(--dim); white-space: nowrap; padding-right: 10px; }
    .review-kv td:last-child  { color: var(--text); word-break: break-word; }
    .review-kv tr.kv-changed td { color: var(--green); }
    .review-kv tr.kv-changed td:first-child { opacity: .7; }
    .review-kv tr.kv-lookup td { opacity: .45; }
    .review-actions { display: flex; gap: 8px; }
    .review-tag {
      display: inline-block;
      font-size: 9px;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
      margin-bottom: 10px;
      border: 1px solid;
    }
    .review-tag.matched  { color: var(--blue);   border-color: var(--blue); }
    .review-tag.ambiguous { color: var(--amber); border-color: var(--amber); }
    .review-tag.unmatched { color: var(--accent); border-color: var(--accent); }

    /* ── Sync log ── */
    .sync-url-row {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sync-url-slug { flex: 1; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sync-result.new   { color: var(--green); }
    .sync-result.error { color: var(--accent); }
    .sync-result.none  { color: var(--dim); }
    .sync-run-list { display: none; padding: 4px 0 4px 16px; }
    .sync-url-group.open .sync-run-list { display: block; }
    .sync-run {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
    }
    .sync-run:last-child { border-bottom: none; }
    .sync-ts { color: var(--dim); min-width: 110px; }
    .sync-review { color: var(--blue); margin-left: 4px; }
    .sync-error { color: var(--dim); font-size: 10px; padding: 2px 0 2px 120px; word-break: break-all; }
    .sync-notes { font-size: 10px; padding: 2px 0 2px 120px; }
    .sync-notes summary { cursor: pointer; color: var(--dim); list-style: none; }
    .sync-notes summary::-webkit-details-marker { display: none; }
    .sync-notes summary::before { content: '▸ '; }
    details.sync-notes[open] summary::before { content: '▾ '; }
    .sync-notes ul { margin: 4px 0 4px 10px; padding: 0; list-style: disc; color: var(--dim); }
  </style>
</head>
<body>

<div id="topbar">
  <div id="topbar-left">
    <span id="topbar-title">Admin</span>
    <a href="/">← Map</a>
  </div>
  <span id="auth-status">not authenticated</span>
</div>

<div id="content">

  <!-- Sync controls -->
  <div class="section">
    <div class="section-title">Sync</div>
    <div id="controls-row">
      <button class="btn" id="scan-btn" onclick="scanInbox()">Scan Inbox</button>
      <input id="url-input" type="text" placeholder="or paste a report URL to process directly" />
      <button class="btn accent" id="submit-btn" onclick="submitUrl()">Submit</button>
    </div>
    <div id="sync-status"></div>
  </div>

  <!-- Review queue -->
  <div class="section">
    <div class="section-title">
      Review Queue
      <button class="btn" onclick="loadReviewQueue()">Load</button>
    </div>
    <div id="review-panel"><div style="color:var(--dim);font-size:11px">Click Load to fetch pending items.</div></div>
  </div>

  <!-- Sync log -->
  <div class="section">
    <div class="section-title">
      Sync Log
      <button class="btn" onclick="loadSyncLog()">Refresh</button>
    </div>
    <div id="sync-log"><div style="color:var(--dim);font-size:11px">Loading…</div></div>
  </div>

</div>

<script>
  let _reviewItems = [];
  let _syncKey = localStorage.getItem('sync_key');

  // ── Auth ──────────────────────────────────────────────────────────────────

  function updateAuthStatus() {
    const el = document.getElementById('auth-status');
    if (_syncKey) {
      el.textContent = 'authenticated';
      el.classList.add('authed');
    } else {
      el.textContent = 'not authenticated';
      el.classList.remove('authed');
    }
  }

  function getKey() {
    if (_syncKey) return _syncKey;
    const k = prompt('Sync key:');
    if (!k) return null;
    _syncKey = k;
    localStorage.setItem('sync_key', k);
    updateAuthStatus();
    return k;
  }

  function handleUnauth() {
    localStorage.removeItem('sync_key');
    _syncKey = null;
    updateAuthStatus();
    alert('Invalid key — cleared. Try again.');
  }

  // ── Sync controls ─────────────────────────────────────────────────────────

  function setSyncStatus(msg, color) {
    const el = document.getElementById('sync-status');
    el.textContent = msg;
    el.style.color = color || 'var(--dim)';
  }

  async function scanInbox() {
    const key = getKey();
    if (!key) return;
    const btn = document.getElementById('scan-btn');
    btn.disabled = true;
    btn.textContent = '…';
    setSyncStatus('Triggering inbox scan…');
    try {
      const r = await fetch('/api/sync/trigger', { method: 'POST', headers: { 'X-Sync-Key': key } });
      if (r.status === 401) { handleUnauth(); return; }
      if (r.status === 429) { setSyncStatus('Triggered recently — wait 10 minutes.', 'var(--accent)'); return; }
      if (!r.ok) { setSyncStatus('Error: ' + r.status, 'var(--accent)'); return; }
      setSyncStatus('Scan triggered. Monitor sync log.', 'var(--green)');
      setTimeout(() => setSyncStatus(''), 6000);
      setTimeout(loadSyncLog, 3000);
    } catch (e) {
      setSyncStatus('Request failed', 'var(--accent)');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Scan Inbox';
    }
  }

  async function submitUrl() {
    const key = getKey();
    if (!key) return;
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '…';
    setSyncStatus('Submitting URL…');
    try {
      const r = await fetch('/api/sync/submit-url', {
        method: 'POST',
        headers: { 'X-Sync-Key': key, 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      if (r.status === 401) { handleUnauth(); return; }
      if (!r.ok) { setSyncStatus('Error: ' + r.status, 'var(--accent)'); return; }
      setSyncStatus('URL submitted. Monitor sync log.', 'var(--green)');
      document.getElementById('url-input').value = '';
      setTimeout(() => setSyncStatus(''), 6000);
      setTimeout(loadSyncLog, 3000);
    } catch (e) {
      setSyncStatus('Request failed', 'var(--accent)');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Submit';
    }
  }

  // ── Review queue ──────────────────────────────────────────────────────────

  const REQUIRED_NEW_FIELDS = ['title', 'location', 'type', 'target_type', 'actor', 'severity', 'description'];

  function missingNewFields(asNew) {
    const item = asNew?.PutRequest?.Item;
    if (!item) return REQUIRED_NEW_FIELDS;
    return REQUIRED_NEW_FIELDS.filter(f => !item[f]);
  }

  // ── Canonical field order for consistent row ordering across panes ──────────
  const FIELD_ORDER = ['id','date','title','location','lat','lng','type','actor',
    'target_type','severity','disputed','description','notes','casualties',
    'source_url','citations','entity','created_at','updated_at','created_source_url'];

  function sortedEntries(obj) {
    return Object.entries(obj).sort(([a], [b]) => {
      const ai = FIELD_ORDER.indexOf(a), bi = FIELD_ORDER.indexOf(b);
      if (ai !== -1 && bi !== -1) return ai - bi;
      if (ai !== -1) return -1;
      if (bi !== -1) return 1;
      return a.localeCompare(b);
    });
  }

  function unwrapDynamo(val) {
    if (val == null || typeof val !== 'object') return val == null ? '' : String(val);
    if ('S'    in val) return val.S;
    if ('N'    in val) return val.N;
    if ('BOOL' in val) return String(val.BOOL);
    if ('NULL' in val) return 'null';
    if ('SS'   in val) return val.SS.join(', ');
    if ('NS'   in val) return val.NS.join(', ');
    if ('L'    in val) return '[' + val.L.map(unwrapDynamo).join(', ') + ']';
    if ('M'    in val) return '{' + Object.entries(val.M).map(([k,v]) => `${k}: ${unwrapDynamo(v)}`).join(', ') + '}';
    return JSON.stringify(val);
  }

  // Render a flat simplified object (existing_record, nearest_record)
  function renderKV(obj) {
    if (!obj || typeof obj !== 'object') return `<pre>${escHtml(String(obj))}</pre>`;
    const rows = sortedEntries(obj)
      .map(([k, v]) => `<tr><td>${escHtml(k)}</td><td>${escHtml(v == null ? '' : String(v))}</td></tr>`)
      .join('');
    return `<table class="review-kv">${rows}</table>`;
  }

  // Render a DynamoDB Item dict (as_new PutRequest.Item)
  function renderDynamoItem(item) {
    if (!item || typeof item !== 'object') return `<pre>${escHtml(String(item))}</pre>`;
    const rows = sortedEntries(item)
      .map(([k, v]) => `<tr><td>${escHtml(k)}</td><td>${escHtml(unwrapDynamo(v))}</td></tr>`)
      .join('');
    return `<table class="review-kv">${rows}</table>`;
  }

  // Render as_update: lookup fields dimmed, changes fields highlighted green
  function renderUpdateTable(asUpdate) {
    if (!asUpdate || typeof asUpdate !== 'object') return renderDynamoItem(asUpdate);
    const lookup  = asUpdate.lookup  || {};
    const changes = asUpdate.changes || {};
    // Build merged map: lookup fields first, changes override; track which type each is
    const merged = {};
    for (const [k, v] of Object.entries(lookup))  merged[k] = { v, t: 'lookup' };
    for (const [k, v] of Object.entries(changes)) merged[k] = { v, t: 'changed' };
    const rows = sortedEntries(merged)
      .map(([k, { v, t }]) => `<tr class="kv-${t}"><td>${escHtml(k)}</td><td>${escHtml(unwrapDynamo(v))}</td></tr>`)
      .join('');
    return `<table class="review-kv">${rows}</table>`;
  }

  // ── Per-pane toggle (table ↔ raw JSON) ───────────────────────────────────
  let _pid = 0;

  function togglePane(id, btn) {
    const t = document.getElementById(id + '-t');
    const r = document.getElementById(id + '-r');
    const showRaw = r.style.display === 'none';
    t.style.display = showRaw ? 'none' : '';
    r.style.display = showRaw ? ''     : 'none';
    btn.textContent = showRaw ? 'TABLE' : 'RAW';
  }

  function renderPane(label, tableHTML, rawObj, extraClass) {
    const id  = `p${++_pid}`;
    const raw = typeof rawObj === 'string' ? rawObj : JSON.stringify(rawObj, null, 2);
    const cls = extraClass ? ` ${extraClass}` : '';
    return `<div class="review-payload${cls}">
      <div class="review-payload-header">
        <div class="review-payload-label">${label}</div>
        <button class="pane-toggle" onclick="togglePane('${id}',this)">RAW</button>
      </div>
      <div id="${id}-t">${tableHTML}</div>
      <div id="${id}-r" style="display:none"><pre>${escHtml(raw)}</pre></div>
    </div>`;
  }

  function reviewItemHTML(item, i) {
    const hasExisting = !!item.existing_record;
    const hasNew      = !!item.as_new;
    const hasUpdate   = !!item.as_update;
    const hasNearest  = !!item.nearest_record;
    const isAmbiguous = hasNew && hasUpdate;

    const missing = hasNew ? missingNewFields(item.as_new) : [];
    const newWarning = missing.length
      ? `<div style="font-size:10px;color:var(--accent);margin-bottom:6px">⚠ missing fields: ${missing.join(', ')}</div>`
      : '';

    let leftCol, middleCol = '';

    if (hasExisting) {
      leftCol = renderPane(
        `Existing Record${item.existing_id ? ` — id ${escHtml(String(item.existing_id))}` : ''}`,
        renderKV(item.existing_record), item.existing_record);
    } else if (isAmbiguous && hasNearest) {
      leftCol   = renderPane(
        `Possible Match${item.nearest_record.id ? ` — id ${escHtml(String(item.nearest_record.id))}` : ''}`,
        renderKV(item.nearest_record), item.nearest_record);
      middleCol = renderPane('As New',
        newWarning + renderDynamoItem(item.as_new?.PutRequest?.Item ?? item.as_new), item.as_new);
    } else if (hasNew) {
      leftCol = renderPane('As New',
        newWarning + renderDynamoItem(item.as_new?.PutRequest?.Item ?? item.as_new), item.as_new);
    } else if (hasNearest) {
      leftCol = renderPane('Nearest Record (outside threshold)',
        renderKV(item.nearest_record), item.nearest_record);
    } else {
      leftCol = `<div class="review-payload unavailable">
        <div class="review-payload-label">No Match Found</div>
        <div style="font-size:10px;color:var(--dim)">not available</div>
      </div>`;
    }

    const updateLabel = hasExisting ? 'Proposed Changes' : 'As Update';
    const updateCol = hasUpdate
      ? renderPane(updateLabel, renderUpdateTable(item.as_update), item.as_update)
      : `<div class="review-payload unavailable">
           <div class="review-payload-label">As Update</div>
           <div style="font-size:10px;color:var(--dim)">not available</div>
         </div>`;

    const tag = hasExisting
      ? `<span class="review-tag matched">Matched Update</span>`
      : isAmbiguous && hasNearest
        ? `<span class="review-tag ambiguous">Ambiguous — Match Found</span>`
      : isAmbiguous
        ? `<span class="review-tag ambiguous">Ambiguous</span>`
      : item.proximity_ambiguous
        ? `<span class="review-tag ambiguous">Proximity Ambiguous</span>`
        : `<span class="review-tag unmatched">Unmatched Update</span>`;

    const threeCol = isAmbiguous && hasNearest ? ' three-col' : '';

    return `<div class="review-item">
      ${tag}
      <div class="review-note">${escHtml(item.note || 'No note provided.')}</div>
      ${item.source_url ? `<div class="review-source"><a href="${escHtml(item.source_url)}" target="_blank" rel="noopener">${escHtml(item.source_url)}</a></div>` : ''}
      <div class="review-payloads${threeCol}">${leftCol}${middleCol}${updateCol}</div>
      <div class="review-actions">
        ${hasNew && !hasExisting ? `<button class="btn green" onclick="resolveReview(${i},'new')" ${missing.length ? 'disabled title="Missing required fields"' : ''}>Approve New</button>` : ''}
        ${hasUpdate ? `<button class="btn blue" onclick="resolveReview(${i},'update')">Approve Update</button>` : ''}
        <button class="btn dim" onclick="resolveReview(${i},'discard')">Discard</button>
      </div>
    </div>`;
  }

  async function loadReviewQueue() {
    const key = getKey();
    if (!key) return;
    const panel = document.getElementById('review-panel');
    panel.innerHTML = '<div style="color:var(--dim);font-size:11px">Loading…</div>';
    try {
      const r = await fetch('/api/review', { headers: { 'X-Sync-Key': key } });
      if (r.status === 401) { handleUnauth(); return; }
      if (!r.ok) { panel.innerHTML = '<div style="color:var(--accent);font-size:11px">Error loading review queue.</div>'; return; }
      _reviewItems = await r.json();
      panel.innerHTML = _reviewItems.length
        ? _reviewItems.map((item, i) => reviewItemHTML(item, i)).join('')
        : '<div style="color:var(--dim);font-size:11px">Queue empty.</div>';
    } catch (e) {
      panel.innerHTML = '<div style="color:var(--accent);font-size:11px">Request failed.</div>';
    }
  }

  async function resolveReview(i, action) {
    const key = getKey();
    if (!key) return;
    const item = _reviewItems[i];
    if (!item) return;
    try {
      const r = await fetch('/api/review/resolve', {
        method: 'POST',
        headers: { 'X-Sync-Key': key, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          receiptHandle: item.receiptHandle,
          action,
          source_url: item.source_url || '',
          sync_id:    item.sync_id    || null,
          as_new:     item.as_new    || null,
          as_update:  item.as_update || null
        })
      });
      if (r.status === 401) { handleUnauth(); return; }
      if (!r.ok) { alert('Resolve failed: ' + r.status); return; }
      _reviewItems.splice(i, 1);
      const panel = document.getElementById('review-panel');
      panel.innerHTML = _reviewItems.length
        ? _reviewItems.map((it, idx) => reviewItemHTML(it, idx)).join('')
        : '<div style="color:var(--dim);font-size:11px">Queue empty.</div>';
    } catch (e) { alert('Request failed'); }
  }

  // ── Sync log ──────────────────────────────────────────────────────────────

  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

  function fmtTs(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return `${MONTHS[d.getMonth()]} ${String(d.getDate()).padStart(2,'0')} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function urlSlug(url) {
    try { return new URL(url).pathname.replace(/^\/analysis\//, '').replace(/\/$/, '') || url; }
    catch { return url; }
  }

  function runResult(run) {
    let cls = 'none', label = 'no changes';
    if (['error','claude_error','fetch_error','no_url','no_email','no_events'].includes(run.status)) {
      cls = 'error'; label = run.status.replace(/_/g, ' ');
    } else if (run.status === 'partial') {
      cls = 'error';
      const parts = [];
      if (run.new_event_count > 0) parts.push(`+${run.new_event_count}`);
      if (run.dead_letter_count > 0) parts.push(`⚠ ${run.dead_letter_count} DLQ`);
      label = parts.join(' / ') || 'partial';
    } else if (run.new_event_count > 0 || run.update_count > 0) {
      cls = 'new';
      const parts = [];
      if (run.new_event_count > 0) parts.push(`+${run.new_event_count} event${run.new_event_count !== 1 ? 's' : ''}`);
      if (run.update_count > 0) parts.push(`${run.update_count} update${run.update_count !== 1 ? 's' : ''}`);
      label = parts.join(' / ');
    }
    return { cls, label };
  }

  function syncLogHTML(groups) {
    if (!groups || !groups.length) return '<div style="color:var(--dim);font-size:11px">No syncs yet.</div>';
    return groups.map((g, gi) => {
      const latest = g.runs[0];
      const { cls, label } = runResult(latest);
      const reviewTotal = g.runs.reduce((sum, r) => sum + (r.review_count || 0), 0);
      const reviewBadge = reviewTotal > 0 ? `<span class="sync-review">↷ ${reviewTotal} review</span>` : '';

      const runsHTML = g.runs.map(run => {
        const { cls: rc, label: rl } = runResult(run);
        const strat = run.url_strategy ? ` <span style="opacity:.5">via ${run.url_strategy.replace(/_/g,' ')}</span>` : '';
        const err = run.error_message ? `<div class="sync-error">${escHtml(run.error_message)}</div>` : '';
        const rb = run.review_count > 0 ? `<span class="sync-review">↷ ${run.review_count}</span>` : '';
        const notes = run.sync_notes?.length
          ? `<details class="sync-notes"><summary>notes (${run.sync_notes.length})</summary><ul>${run.sync_notes.map(n => `<li>${escHtml(n)}</li>`).join('')}</ul></details>`
          : '';
        return `<div class="sync-run">
          <span class="sync-ts">${fmtTs(run.run_id)}</span>
          <span class="sync-result ${rc}">${rl}</span>${strat}${rb}
        </div>${err}${notes}`;
      }).join('');

      return `<div class="sync-url-group" id="sg${gi}">
        <div class="sync-url-row" onclick="document.getElementById('sg${gi}').classList.toggle('open')">
          <span class="sync-ts">${fmtTs(latest.run_id)}</span>
          <span class="sync-url-slug" title="${escHtml(g.url)}">${escHtml(urlSlug(g.url))}</span>
          <span class="sync-result ${cls}">${label} ▾</span>
          ${reviewBadge}
        </div>
        <div class="sync-run-list">${runsHTML}</div>
      </div>`;
    }).join('');
  }

  function loadSyncLog() {
    fetch('/api/syncs')
      .then(r => r.ok ? r.json() : [])
      .then(data => { document.getElementById('sync-log').innerHTML = syncLogHTML(data); })
      .catch(() => { document.getElementById('sync-log').innerHTML = '<div style="color:var(--accent);font-size:11px">Failed to load.</div>'; });
  }

  // ── Utils ─────────────────────────────────────────────────────────────────

  function escHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  updateAuthStatus();
  loadSyncLog();
</script>
</body>
</html>
